<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHOOD Garage Academy</title>

<style>
body { font-family: Arial; margin:0; background:#111; color:#fff; }
header { background:#000; padding:20px; text-align:center; }

.logo-box { display:flex; align-items:center; justify-content:center; gap:10px; }
.logo-box img { width:50px; height:50px; border-radius:50%; }

nav { background:#222; text-align:center; padding:15px; }
nav a { color:white; margin:10px; text-decoration:none; }

section { padding:40px 20px; max-width:1100px; margin:auto; }

.gallery-container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap:15px;
}

.gallery-container img {
  width:100%;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.gallery-container img:hover {
  transform:scale(1.05);
}

.card {
  background:#222;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

.btn {
  background:#38bdf8;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

footer {
  background:#000;
  text-align:center;
  padding:20px;
}

/* Lightbox */
.lightbox {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}

.lightbox img {
  max-width:90%;
}
</style>
</head>

<body>

<header>
  <div class="logo-box">
    <img src="khood1.jpg">
    <h1 ondblclick="enableManager()">KHOOD GARAGE ACADEMY</h1>
  </div>
  <p>Professional Automotive Services</p>
</header>

<nav>
  <a href="#gallery">Gallery</a>
  <a href="#booking">Booking</a>
  <a href="#contact">Contact</a>
</nav>

<!-- GALLERY -->
<section id="gallery">
  <h2>Our Work</h2>
  <div class="gallery-container">
    <img src="khood1.jpg" onclick="openImage(this.src)">
    <img src="khood2.jpg" onclick="openImage(this.src)">
    <img src="khood3.jpg" onclick="openImage(this.src)">
    <img src="khood4.jpg" onclick="openImage(this.src)">
    <img src="khood5.jpg" onclick="openImage(this.src)">
    <img src="khood6.jpg" onclick="openImage(this.src)">
    <img src="khood7.jpg" onclick="openImage(this.src)">
    <img src="khood8.jpg" onclick="openImage(this.src)">
    <img src="khood9.jpg" onclick="openImage(this.src)">
    <img src="khood10.jpg" onclick="openImage(this.src)">
    <img src="khood11.jpg" onclick="openImage(this.src)">
    <img src="khood12.jpg" onclick="openImage(this.src)">
  </div>
</section>

<!-- VIDEO -->
<section>
  <h2>Work in Action</h2>
  <video width="100%" controls>
    <source src="video.mp4" type="video/mp4">
    Your browser does not support video.
  </video>
</section>

<!-- BOOKING -->
<section id="booking">
  <h2>Parking Booking</h2>

  <div class="card">
    <input id="car" placeholder="Car Plate" style="width:100%; padding:10px;"><br><br>
    <input type="date" id="checkin" style="width:100%; padding:10px;"><br><br>
    <input type="date" id="checkout" style="width:100%; padding:10px;"><br><br>

    <button class="btn" onclick="saveBooking()">Save Booking</button>
  </div>

  <h3>Bookings</h3>
  <div id="bookingList"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>Main: +254 790 884715</p>
  <p>Manager: +254 726 507281</p>
</section>

<footer>
  <p>© 2026 All Rights Reserved</p>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<script>
// IMAGE VIEW
function openImage(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}
function closeImage(){
  document.getElementById("lightbox").style.display="none";
}

// MANAGER MODE
let isManager = false;
function enableManager() {
  let pass = prompt("Enter manager code");
  if (pass === "0726507281") {
    isManager = true;
    alert("Manager mode ON");
  }
}

// AUTO DAYS
function calculateDays(checkin, checkout) {
  let start = new Date(checkin);
  let end = checkout ? new Date(checkout) : new Date();
  let diff = end - start;
  let days = Math.ceil(diff / (1000 * 60 * 60 * 24));
  return days > 0 ? days : 1;
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBx0qgCaXrj04sdnUtJcASqD1FvsFdkE8",
  authDomain: "khood-garage.firebaseapp.com",
  databaseURL: "https://khood-garage-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "khood-garage",
  storageBucket: "khood-garage.firebasestorage.app",
  messagingSenderId: "340475285788",
  appId: "1:340475285788:web:59cbc536398554b563ead9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// SAVE
window.saveBooking = function() {
  let car = document.getElementById("car").value;
  let checkin = document.getElementById("checkin").value;
  let checkout = document.getElementById("checkout").value || "";

  if (!car || !checkin) {
    alert("Fill all fields");
    return;
  }

  let days = calculateDays(checkin, checkout);

  push(ref(db, "bookings"), {
    car,
    checkin,
    checkout: checkout || "Not set",
    days
  });
};

// LOAD
onValue(ref(db, "bookings"), (snapshot) => {
  let data = snapshot.val();
  let container = document.getElementById("bookingList");
  container.innerHTML = "";

  if (!data) {
    container.innerHTML = "No bookings";
    return;
  }

  for (let id in data) {
    let b = data[id];
    let days = calculateDays(b.checkin, b.checkout === "Not set" ? "" : b.checkout);

    container.innerHTML += `
      <div class="card">
        <p><b>${b.car}</b></p>
        <p>${b.checkin} → ${b.checkout}</p>
        <p>Days: ${days}</p>

        ${isManager ? `<button onclick="deleteBooking('${id}')">Delete</button>` : ""}
      </div>
    `;
  }
});

// DELETE
window.deleteBooking = function(id) {
  remove(ref(db, "bookings/" + id));
};
</script>

</body>
</html>
